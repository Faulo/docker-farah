name: Docker

on:
    push:
        branches:
            - "main"
    schedule:
        - cron: "0 0 1 * *"

jobs:
    docker-windows:
        runs-on: windows-2022
        env:
            os: windows
        strategy:
            fail-fast: false
            matrix:
                php: ["8.2", "8.3", "8.4", "8.5"]
        steps:
            - name: Ensure Docker is running
              shell: pwsh
              run: |
                  $service = Get-Service docker -ErrorAction Stop
                  if ($service.Status -ne 'Running') {
                    Start-Service docker
                  }

                  $ready = $false
                  1..24 | ForEach-Object {
                    try {
                      docker version
                      $ready = $true
                      return
                    } catch {
                      Start-Sleep -Seconds 5
                    }
                  }

                  if (-not $ready) {
                    Get-Service docker
                    throw "Docker daemon not ready"
                  }
            - name: Checkout
              uses: actions/checkout@v6
            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Build ${{secrets.DOCKERHUB_USERNAME}}/farah:${{matrix.php}}-${{env.os}}
              working-directory: .
              run: docker build --isolation=hyperv ${{env.os}} -t ${{secrets.DOCKERHUB_USERNAME}}/farah:${{matrix.php}}-${{env.os}} --build-arg PHP_VERSION=${{matrix.php}}
            - name: Push ${{secrets.DOCKERHUB_USERNAME}}/farah:${{matrix.php}}-${{env.os}}
              run: docker image push ${{secrets.DOCKERHUB_USERNAME}}/farah:${{matrix.php}}-${{env.os}}
    docker-linux:
        runs-on: ubuntu-24.04
        env:
            os: linux
        strategy:
            fail-fast: false
            matrix:
                include:
                    - php: "8.2"
                      debian: "bookworm"
                    - php: "8.3"
                      debian: "bookworm"
                    - php: "8.4"
                      debian: "bookworm"
                    - php: "8.5"
                      debian: "bookworm"
        steps:
            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4
            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Build and push ${{secrets.DOCKERHUB_USERNAME}}/farah:${{matrix.php}}-${{env.os}}
              uses: docker/build-push-action@v7
              with:
                  push: true
                  tags: ${{secrets.DOCKERHUB_USERNAME}}/farah:${{matrix.php}}-${{env.os}}
                  platforms: ${{env.os}}/amd64
                  context: "{{defaultContext}}:${{env.os}}"
                  file: Dockerfile
                  build-args: |
                      PHP_VERSION=${{matrix.php}}
                      DEBIAN=${{matrix.debian}}
                  provenance: false
    merge:
        runs-on: ubuntu-24.04
        needs:
            - docker-windows
            - docker-linux
        strategy:
            fail-fast: false
            matrix:
                php: ["8.2", "8.3", "8.4", "8.5"]
        steps:
            - name: Login to Docker Hub
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Merge manifests
              uses: Noelware/docker-manifest-action@v1
              with:
                  inputs: ${{secrets.DOCKERHUB_USERNAME}}/farah:${{matrix.php}}
                  tags: ${{secrets.DOCKERHUB_USERNAME}}/farah:${{matrix.php}}-linux,${{secrets.DOCKERHUB_USERNAME}}/farah:${{matrix.php}}-windows
                  push: true
                  fallback: true
